<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>HRZN Sphere</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div class="app" id="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <img class="brand__logo" id="brandLogo" src="assets/logo.svg" alt="Logo"/>
        <div class="brand__text">
          <div class="brand__name" id="brandName">HRZN Sphere</div>
          <div class="brand__sub" id="brandSub">Operações • Workspace</div>
        </div>
        <div class="brand__spacer"></div>
        <button class="iconbtn" id="themeToggle" title="Alternar modo claro/escuro">
  <!-- Bootstrap Icons -->
  <svg class="icon icon--sun" viewBox="0 0 16 16" aria-hidden="true">
    <path d="M12 8a4 4 0 1 1-8 0 4 4 0 0 1 8 0z"/>
    <path d="M8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0zm0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13zm8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 16 8zM3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8zm10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0zm-8.486 8.486a.5.5 0 0 1 0 .707L3.757 12.95a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0zm8.486 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707zM5.171 5.17a.5.5 0 0 1-.707 0L3.05 3.757a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707z"/>
  </svg>
  <svg class="icon icon--moon" viewBox="0 0 16 16" aria-hidden="true">
    <path d="M6 .278a.768.768 0 0 1 .08.858 7.208 7.208 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.787.787 0 0 1 .81.316.733.733 0 0 1-.031.893A8.349 8.349 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.752.752 0 0 1 6 .278z"/>
    <path d="M10.794 3.148a.217.217 0 0 1 .412 0l.387 1.162c.173.518.579.924 1.097 1.097l1.162.387a.217.217 0 0 1 0 .412l-1.162.387a1.734 1.734 0 0 0-1.097 1.097l-.387 1.162a.217.217 0 0 1-.412 0l-.387-1.162A1.734 1.734 0 0 0 9.31 6.207l-1.162-.387a.217.217 0 0 1 0-.412l1.162-.387a1.734 1.734 0 0 0 1.097-1.097l.387-1.162z"/>
    <path d="M13.863.099a.145.145 0 0 1 .274 0l.258.774c.115.346.386.617.732.732l.774.258a.145.145 0 0 1 0 .274l-.774.258a1.156 1.156 0 0 0-.732.732l-.258.774a.145.145 0 0 1-.274 0l-.258-.774a1.156 1.156 0 0 0-.732-.732l-.774-.258a.145.145 0 0 1 0-.274l.774-.258c.346-.115.617-.386.732-.732L13.863.1z"/>
  </svg>
</button>

<button class="iconbtn" id="privacyToggle" title="Censurar/mostrar dados de clientes">
  <!-- Bootstrap Icons -->
  <svg class="icon icon--eye" viewBox="0 0 16 16" aria-hidden="true">
    <path d="M16 8s-3 5.5-8 5.5S0 8 0 8s3-5.5 8-5.5S16 8 16 8z"/>
    <path d="M8 5a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
  </svg>
  <svg class="icon icon--eye-slash" viewBox="0 0 16 16" aria-hidden="true">
    <path d="M13.359 11.238C14.365 10.14 15 8.9 15 8s-3-5.5-7-5.5c-1.11 0-2.15.17-3.1.47l1.29 1.29A5.44 5.44 0 0 1 8 3.5c3.04 0 5.5 3.5 5.5 3.5s-.55.86-1.5 1.86l1.359 1.378z"/>
    <path d="M11.354 9.233a3 3 0 0 0-4.587-4.587l1.048 1.048A1.5 1.5 0 0 1 10.306 8.186l1.048 1.047z"/>
    <path d="M2.646 3.354l10 10-.708.708-10-10 .708-.708z"/>
    <path d="M4.64 5.348C3.635 6.446 3 7.686 3 8c0 .9 2.46 4.5 5 4.5 1.11 0 2.15-.17 3.1-.47l-1.29-1.29A5.44 5.44 0 0 1 8 12.5C4.96 12.5 2.5 9 2.5 9S3.05 8.14 4 7.14L4.64 5.348z"/>
    <path d="M6.767 6.767l1.048 1.048A1.5 1.5 0 0 0 7.5 9.5a1.5 1.5 0 0 0 1.685-.315l1.048 1.048A3 3 0 0 1 6.767 6.767z"/>
  </svg>
</button>
</div>

      <div class="search">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M10 18a8 8 0 1 1 5.293-14.293A8 8 0 0 1 10 18Zm0-2a6 6 0 1 0-4.243-10.243A6 6 0 0 0 10 16Zm9.707 4.293-4.07-4.07 1.414-1.414 4.07 4.07-1.414 1.414Z"/></svg>
        <input id="q" type="search" placeholder="Buscar" autocomplete="off"/>
      </div>
<nav class="nav" id="nav">
        <button class="nav__item" data-route="dashboard">
          <span class="nav__dot"></span>
          <span>Visão geral</span>
        </button>

        <!-- Grupo: Clientes -->
        <div class="nav__group" data-group="clients">
          <button class="nav__item nav__item--group" data-group-toggle="clients" type="button">
            <span class="nav__dot"></span>
            <span>Clientes</span>
            <svg class="nav__chev" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9 18l6-6-6-6" fill="currentColor"/>
            </svg>
          </button>
          <div class="nav__sub" aria-label="Submenu Clientes">
            <button class="nav__subitem" data-route="clients">
              <span>Lista de Clientes</span>
              <span class="pill" id="pillClients">0</span>
            </button>
            <button class="nav__subitem" data-route="contracts">
              <span>Contratos</span>
              <span class="pill" id="pillContracts">0</span>
            </button>
            <button class="nav__subitem" data-route="crm">
              <span>CRM (Kanban)</span>
            </button>
          </div>
        </div>

        <!-- Grupo: Finanças -->
        <div class="nav__group" data-group="finance">
          <button class="nav__item nav__item--group" data-group-toggle="finance" type="button">
            <span class="nav__dot"></span>
            <span>Finanças</span>
            <svg class="nav__chev" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9 18l6-6-6-6" fill="currentColor"/>
            </svg>
          </button>
          <div class="nav__sub" aria-label="Submenu Finanças">
            <button class="nav__subitem" data-route="finance">
              <span>Controle de Gastos</span>
            </button>
            <button class="nav__subitem" data-route="bills">
              <span>Contas a Pagar</span>
            </button>
            <button class="nav__subitem" data-route="receivables">
              <span>À Receber</span>
            </button>
          </div>
        </div>

        <button class="nav__item" data-route="tasks">
          <span class="nav__dot"></span>
          <span>Tarefas</span>
        </button>
        <button class="nav__item" data-route="settings">
          <span class="nav__dot"></span>
          <span>Configurações</span>
        </button>
      </nav>

      <div class="sidebar__footer">
        <div class="muted"><code>Horizon Interactive Studios</code></div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar__left">
          <div class="crumb" id="crumb">Visão geral</div>
          <div class="hint" id="hint">Clientes, contratos, financeiro e tarefas.</div>
        </div>
        <div class="topbar__right" id="topActions">
          <!-- ações dinâmicas -->
        </div>
      </header>

      <section class="content" id="content"></section>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal__backdrop" data-close="1"></div>
    <div class="modal__panel" role="dialog" aria-modal="true" aria-label="Modal">
      <div class="modal__header">
        <div class="modal__title" id="modalTitle">Modal</div>
        <button class="iconbtn" id="modalClose" aria-label="Fechar">
          <svg class="icon" viewBox="0 0 24 24"><path d="M18.3 5.71 12 12l6.3 6.29-1.41 1.42L10.59 13.4 4.29 19.71 2.88 18.3 9.17 12 2.88 5.71 4.29 4.29l6.3 6.3 6.29-6.3 1.42 1.42Z"/></svg>
        </button>
      </div>
      <div class="modal__body" id="modalBody"></div>
      <div class="modal__footer" id="modalFooter"></div>
    </div>
  </div>

  <!-- html2pdf (client-side PDF) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
